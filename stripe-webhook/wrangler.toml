name = "marketdaily-webhook"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
BREVO_LIST_ID = "2"

[[kv_namespaces]]
binding = "USER_PREFS"
id = "f5229c5bf86a4f8b88d71995005cd670"

# Lifecycle email sweep:每天 22:30 UTC = 隔日 06:30 TWT,跑在日報(06:55 UTC)之前
# Reactive content sweep:每 15 分鐘掃 RSS,命中關鍵字 → AI 寫 hot take → pending(96 次/天,免費層內)
[triggers]
crons = ["30 22 * * *", "*/15 * * * *"]
