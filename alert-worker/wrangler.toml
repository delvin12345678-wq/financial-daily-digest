name = "marketdaily-alert-worker"
main = "src/index.js"
compatibility_date = "2026-05-01"

# 每 2 分鐘掃一次新聞,比對 Premium 用戶持股,重大則即時 LINE 推播。
[triggers]
crons = ["*/2 * * * *"]

# 與 marketdaily-webhook 共用同一個 KV namespace。
[[kv_namespaces]]
binding = "USER_PREFS"
id = "f5229c5bf86a4f8b88d71995005cd670"

# Secret(用 `wrangler secret put` 設定,不寫進這裡):
#   ANTHROPIC_API_KEY          — Claude 嚴重度判定
#   LINE_CHANNEL_ID            — Messaging API channel id(2010166664),動態換推播 token
#   LINE_CHANNEL_SECRET        — Messaging API channel secret
#   LINE_CHANNEL_ACCESS_TOKEN  — (選用)直接給長期 token,設了就不動態換
#
# 開真推前先觀察:KV `alert:enabled` 不是 "true" 時,scheduled() 只跑不推。
#   開:  npx wrangler kv key put "alert:enabled" "true"  --namespace-id=f5229c5bf86a4f8b88d71995005cd670
#   關:  npx wrangler kv key delete "alert:enabled"       --namespace-id=f5229c5bf86a4f8b88d71995005cd670
