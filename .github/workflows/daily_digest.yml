name: 財經日報每日發布

on:
  # 每日寄送已改由本機 launchd（com.marketdaily.daily-digest，台灣 07:00）負責。
  # GitHub Actions 的 schedule 觸發不準時（實測延遲約 12 小時），故移除排程，只保留手動觸發。
  workflow_dispatch:       # 僅供手動測試

permissions:
  contents: write          # 寄信後把當日公版日報 commit 回 main（不重寄、不部署）

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          MARKETDAILY_INTERNAL_TOKEN: ${{ secrets.MARKETDAILY_INTERNAL_TOKEN }}
        run: python main.py

      # 寄信由上一步的 main.py 完成。這一步「只」把當日公版日報 + manifest commit 回 main,
      # 讓戰績 builder(weekly_track_record)checkout 時讀得到本機檔,不再依賴脆弱的 CDN 抓取。
      # 嚴格排除個人化日報(含訂閱者持股),不重寄信、不部署。
      - name: Persist public digest archive
        if: success()
        run: |
          rm -f docs/output/*_personal_*.html
          git config user.name "marketdaily-bot"
          git config user.email "marketdailyhq@gmail.com"
          shopt -s nullglob
          for f in docs/output/digest_*.html; do
            case "$f" in *_personal_*) continue;; esac
            git add "$f"
          done
          git add docs/output/manifest.json
          if git diff --cached --quiet; then
            echo "No new public digest to commit."
          else
            git commit -m "chore(digest): persist public archive $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
