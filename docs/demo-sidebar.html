<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>風格 3 — 側邊欄</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; display: flex; }

.sidebar { width: 200px; min-height: 100vh; background: #1a1a2e; display: flex; flex-direction: column; padding: 24px 0; flex-shrink: 0; }
.sidebar-logo { font-size: 15px; font-weight: 800; color: #fde68a; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 16px; }
.sidebar-logo span { color: #a5b4fc; }

.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent; }
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
.nav-item.active { color: #fff; background: rgba(99,102,241,0.15); border-left-color: #6366f1; }
.nav-icon { font-size: 15px; }

.sidebar-bottom { margin-top: auto; padding: 16px 20px 0; border-top: 1px solid rgba(255,255,255,0.07); }
.sidebar-email { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.logout-btn { font-size: 12px; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 8px; cursor: pointer; width: 100%; }

.main { flex: 1; padding: 32px 28px; overflow-y: auto; }
.page-title { font-size: 20px; font-weight: 800; color: #111; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: #888; margin-bottom: 28px; }

.card { background: #fff; border: 1px solid #eee; border-radius: 16px; padding: 22px; margin-bottom: 16px; }
.card-title { font-size: 14px; font-weight: 800; color: #222; margin-bottom: 4px; }
.card-desc { font-size: 12px; color: #aaa; margin-bottom: 16px; }

.search-wrap { position: relative; margin-bottom: 12px; }
.search-input { width: 100%; padding: 10px 14px 10px 36px; background: #f8f9fc; border: 1.5px solid #e8e8f0; border-radius: 10px; font-size: 13px; color: #333; outline: none; }
.search-input::placeholder { color: #bbb; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; }

.tags { display: flex; flex-wrap: wrap; gap: 7px; }
.tag { background: #eef2ff; border: 1.5px solid #c7d2fe; color: #4338ca; font-size: 12px; font-weight: 700; padding: 5px 10px 5px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; }
.tag-x { color: #a5b4fc; cursor: pointer; }

.report-list { display: flex; flex-direction: column; gap: 8px; }
.report-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #f8f9fc; border: 1px solid #eee; border-radius: 12px; cursor: pointer; }
.report-item:hover { background: #eef2ff; border-color: #c7d2fe; }
.report-date { font-size: 13px; font-weight: 700; color: #222; }
.report-sub { font-size: 11px; color: #aaa; }
.report-arrow { font-size: 13px; color: #6366f1; font-weight: 700; }

.save-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #6366f1, #4338ca); color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }

.demo-tag { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: #16a34a; color: #fff; font-size: 12px; font-weight: 800; padding: 5px 16px; border-radius: 20px; z-index: 999; }
</style>
</head>
<body>
<div class="demo-tag">🎨 風格 3 — 側邊欄導覽</div>

<div class="sidebar">
  <div class="sidebar-logo">Market<span>Daily</span></div>
  <div class="nav-item"><span class="nav-icon">🏠</span> 首頁概覽</div>
  <div class="nav-item active"><span class="nav-icon">📊</span> 我的持倉</div>
  <div class="nav-item"><span class="nav-icon">📨</span> 最近報告</div>
  <div class="nav-item"><span class="nav-icon">⚙️</span> 帳號設定</div>
  <div class="sidebar-bottom">
    <div class="sidebar-email">delvin@gmail.com</div>
    <button class="logout-btn">登出</button>
  </div>
</div>

<div class="main">
  <div class="page-title">📊 我的持倉設定</div>
  <div class="page-sub">選擇你追蹤的股票，每天報告會優先分析這些持股</div>

  <div class="card">
    <div class="card-title">🇺🇸 美股</div>
    <div class="card-desc">搜尋代號或公司名稱加入清單</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" placeholder="搜尋美股代號或名稱...">
    </div>
    <div class="tags">
      <div class="tag">NVDA <span class="tag-x">×</span></div>
      <div class="tag">TSLA <span class="tag-x">×</span></div>
      <div class="tag">AAPL <span class="tag-x">×</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🇹🇼 台股</div>
    <div class="card-desc">搜尋代號或公司名稱加入清單</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" placeholder="搜尋台股代號或名稱...">
    </div>
    <div class="tags">
      <div class="tag">2330 台積電 <span class="tag-x">×</span></div>
      <div class="tag">2454 聯發科 <span class="tag-x">×</span></div>
    </div>
  </div>

  <button class="save-btn">儲存設定</button>
</div>
</body>
</html>
