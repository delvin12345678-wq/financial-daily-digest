<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>風格 1 — 深色極簡</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a12; color: #fff; min-height: 100vh; }

nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 32px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.logo { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
.logo span { color: #6366f1; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-email { font-size: 13px; color: rgba(255,255,255,0.5); }
.logout-btn { font-size: 12px; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 5px 14px; border-radius: 20px; cursor: pointer; }

.hero { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); padding: 40px 32px 32px; }
.hero-label { font-size: 11px; color: #a5b4fc; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
.hero-name { font-size: 26px; font-weight: 800; color: #fde68a; margin-bottom: 6px; }
.hero-sub { font-size: 13px; color: #c4b5fd; }
.plan-badge { display: inline-block; background: rgba(99,102,241,0.25); border: 1px solid rgba(99,102,241,0.4); color: #a5b4fc; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-top: 12px; letter-spacing: 0.5px; }

.container { max-width: 700px; margin: 0 auto; padding: 28px 20px 60px; }

.section-title { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }

.card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 22px; margin-bottom: 16px; }
.card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.card-title { font-size: 14px; font-weight: 700; color: #e2e8f0; }
.card-action { font-size: 12px; color: #6366f1; cursor: pointer; }

.search-wrap { position: relative; margin-bottom: 14px; }
.search-input { width: 100%; padding: 10px 14px 10px 36px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 13px; color: #fff; outline: none; }
.search-input::placeholder { color: rgba(255,255,255,0.3); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; }

.tags { display: flex; flex-wrap: wrap; gap: 8px; }
.tag { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.35); color: #a5b4fc; font-size: 12px; font-weight: 700; padding: 5px 10px 5px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; }
.tag-x { color: rgba(165,180,252,0.5); cursor: pointer; }
.tags-empty { font-size: 12px; color: rgba(255,255,255,0.2); }

.report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.report-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: background 0.15s; }
.report-item:hover { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.25); }
.report-date { font-size: 13px; font-weight: 700; color: #e2e8f0; }
.report-sub { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 4px; }
.report-arrow { font-size: 11px; color: #6366f1; margin-top: 8px; }

.save-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #6366f1, #4338ca); color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; }

.demo-tag { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: #fde68a; color: #1a1a1a; font-size: 12px; font-weight: 800; padding: 5px 16px; border-radius: 20px; z-index: 999; letter-spacing: 0.5px; }

/* === 手機版導覽列修正(pills 不換行、縮小、放不下水平滑動)=== */
@media (max-width: 600px) {
  nav { padding: 0 14px; gap: 10px; }
  .nav-logo { font-size: 15px; gap: 7px; flex-shrink: 0; }
  .nav-logo-icon { width: 26px; height: 26px; }
  .nav-right { gap: 6px; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .nav-right::-webkit-scrollbar { display: none; }
  .nav-back, .lang-btn { white-space: nowrap; flex-shrink: 0; font-size: 12px; padding: 6px 11px; line-height: 1.2; }
}

</style>
</head>
<body>
<div class="demo-tag">🎨 風格 1 — 深色極簡</div>

<nav>
  <div class="logo">Market<span>Daily</span></div>
  <div class="nav-right">
    <span class="nav-email">delvin@gmail.com</span>
    <button class="logout-btn">登出</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-label">財經日報 · 訂閱者專區</div>
  <div class="hero-name">👋 嗨，Delvin</div>
  <div class="hero-sub">每天早上 7:00 AM，你的個人化財經日報已準備好</div>
  <div class="plan-badge">✅ 免費方案 · 訂閱中</div>
</div>

<div class="container">
  <div class="section-title">我的持倉設定</div>
  <div class="card">
    <div class="card-head">
      <div class="card-title">🇺🇸 美股</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" placeholder="搜尋股票代號或名稱...">
    </div>
    <div class="tags">
      <div class="tag">NVDA <span class="tag-x">×</span></div>
      <div class="tag">TSLA <span class="tag-x">×</span></div>
      <div class="tag">AAPL <span class="tag-x">×</span></div>
    </div>
  </div>
  <div class="card">
    <div class="card-head">
      <div class="card-title">🇹🇼 台股</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" placeholder="搜尋台股代號或名稱...">
    </div>
    <div class="tags">
      <div class="tag">2330 台積電 <span class="tag-x">×</span></div>
      <div class="tag">2454 聯發科 <span class="tag-x">×</span></div>
    </div>
  </div>
  <button class="save-btn">儲存設定</button>

  <div class="section-title" style="margin-top:28px;">最近報告</div>
  <div class="card">
    <div class="report-grid">
      <div class="report-item"><div class="report-date">📄 2026-05-19</div><div class="report-sub">今日報告</div><div class="report-arrow">查看 →</div></div>
      <div class="report-item"><div class="report-date">📄 2026-05-18</div><div class="report-sub">昨日報告</div><div class="report-arrow">查看 →</div></div>
      <div class="report-item"><div class="report-date">📄 2026-05-17</div><div class="report-sub">2 天前</div><div class="report-arrow">查看 →</div></div>
      <div class="report-item"><div class="report-date">📄 2026-05-16</div><div class="report-sub">3 天前</div><div class="report-arrow">查看 →</div></div>
    </div>
  </div>
</div>
</body>
</html>
