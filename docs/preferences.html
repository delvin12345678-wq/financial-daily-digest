<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的設定 · MarketDaily</title>
<meta http-equiv="refresh" content="0; url=/dashboard?focus=stocks">
<link rel="canonical" href="/dashboard">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #060611; color: #f1f5f9;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; }
  .inner { max-width: 420px; }
  h1 { font-size: 22px; font-weight: 800; margin: 0 0 10px; letter-spacing: -0.5px; }
  p { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.7; margin: 0 0 22px; }
  a.btn { display: inline-block; padding: 12px 22px; border-radius: 12px;
    background: #6366f1; color: #fff; font-weight: 700; font-size: 14px;
    text-decoration: none; box-shadow: 0 4px 20px rgba(99,102,241,0.42); }
  a.btn:hover { background: #4f46e5; }
</style>
<script>
  // 立即跳轉,保留 query params(讓 utm_* / email= 等繼續流到 dashboard)
  (function () {
    var qs = location.search || "";
    var sep = qs ? "&" : "?";
    location.replace("/dashboard" + qs + sep + "focus=stocks");
  })();
</script>
</head>
<body>
<div class="wrap">
  <div class="inner">
    <h1>跳轉中…</h1>
    <p>我的設定已整合到「訂閱專區」。<br>請至 dashboard 直接管理你的股票偏好。</p>
    <a class="btn" href="/dashboard?focus=stocks">前往 Dashboard →</a>
  </div>
</div>
</body>
</html>
