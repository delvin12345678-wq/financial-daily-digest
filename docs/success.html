<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂閱成功 — MarketDaily</title>
<meta name="robots" content="noindex">
<meta name="description" content="MarketDaily 訂閱成功，立即啟用你的個人化財經日報。">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/logo-icon.svg">
<link rel="icon" type="image/svg+xml" href="/logo-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: radial-gradient(ellipse at top, #1a1633 0%, #0f0c29 45%, #07060f 100%);
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 22px;
    padding: 44px 34px 36px;
    backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    text-align: center;
  }
  .logo-row { display: flex; align-items: center; justify-content: center; gap: 9px; margin-bottom: 30px; }
  .logo-row img { width: 34px; height: 34px; border-radius: 9px; }
  .logo-row span { font-size: 17px; font-weight: 800; letter-spacing: -0.4px; }
  .check {
    width: 76px; height: 76px; margin: 0 auto 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, #34d399, #10b981);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: #fff;
    box-shadow: 0 12px 32px rgba(16,185,129,0.4);
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
  h1 { font-size: 25px; font-weight: 900; letter-spacing: -0.6px; margin-bottom: 10px; }
  .sub { font-size: 14.5px; color: #b9b9cc; line-height: 1.7; margin-bottom: 28px; }
  .sub strong { color: #fde68a; }
  .steps {
    text-align: left;
    background: rgba(99,102,241,0.07);
    border: 1px solid rgba(99,102,241,0.18);
    border-radius: 14px;
    padding: 20px 20px 8px;
    margin-bottom: 26px;
  }
  .step { display: flex; gap: 13px; margin-bottom: 14px; }
  .step .n {
    flex: none; width: 26px; height: 26px; border-radius: 50%;
    background: linear-gradient(135deg,#6366f1,#8b5cf6);
    color: #fff; font-size: 13px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .step .t { font-size: 13.5px; color: #d0d0e0; line-height: 1.6; }
  .step .t b { color: #fff; font-weight: 700; }
  .btn {
    display: block; width: 100%;
    padding: 16px; border-radius: 13px;
    background: linear-gradient(135deg,#6366f1,#8b5cf6);
    color: #fff; font-size: 16px; font-weight: 800;
    text-decoration: none; letter-spacing: 0.2px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 10px 28px rgba(99,102,241,0.4);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(99,102,241,0.55); }
  .note { margin-top: 18px; font-size: 12px; color: #7a7a92; line-height: 1.7; }
  .note a { color: #a5b4fc; text-decoration: none; }
  .lang-btn {
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 700; font-family: inherit;
    padding: 6px 13px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
  }
  .lang-btn:hover { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.28); color: #fff; }
</style>
</head>
<body>
  <button class="lang-btn" onclick="toggleLang()">EN</button>
  <div class="card">
    <div class="logo-row">
      <img src="/logo-icon.svg" alt="MD">
      <span>MarketDaily</span>
    </div>
    <div class="check">✓</div>
    <h1 data-i18n="success_title">訂閱成功 🎉</h1>
    <p class="sub" data-i18n-html="success_sub">付款已完成，你的方案<strong>立即生效</strong>。<br>一封確認信正在寄往你的信箱。</p>

    <div class="steps">
      <div class="step">
        <div class="n">1</div>
        <div class="t" data-i18n-html="step1"><b>收確認信</b> — 打開信箱（含垃圾信匣），找「訂閱成功」那封信。</div>
      </div>
      <div class="step">
        <div class="n">2</div>
        <div class="t" data-i18n-html="step2"><b>設定密碼</b> — 第一次登入「我的專區」時設一組密碼。</div>
      </div>
      <div class="step">
        <div class="n">3</div>
        <div class="t" data-i18n-html="step3"><b>挑你的股票</b> — 加入關注的美股／台股，明早 7 點的日報就會為你客製化。</div>
      </div>
    </div>

    <a class="btn" href="/dashboard.html" data-i18n="success_btn">前往我的專區 →</a>
    <p class="note" data-i18n-html="success_note">沒收到確認信？等 5 分鐘並檢查垃圾信匣，<br>仍沒有請寄信到 <a href="mailto:delvin.12345678@gmail.com">delvin.12345678@gmail.com</a></p>
  </div>

<script>
const i18n = {
  zh: {
    page_title: "訂閱成功 — MarketDaily",
    success_title: "訂閱成功 🎉",
    success_sub: "付款已完成，你的方案<strong>立即生效</strong>。<br>一封確認信正在寄往你的信箱。",
    step1: "<b>收確認信</b> — 打開信箱（含垃圾信匣），找「訂閱成功」那封信。",
    step2: "<b>設定密碼</b> — 第一次登入「我的專區」時設一組密碼。",
    step3: "<b>挑你的股票</b> — 加入關注的美股／台股，明早 7 點的日報就會為你客製化。",
    success_btn: "前往我的專區 →",
    success_note: "沒收到確認信？等 5 分鐘並檢查垃圾信匣，<br>仍沒有請寄信到 <a href=\"mailto:delvin.12345678@gmail.com\">delvin.12345678@gmail.com</a>"
  },
  en: {
    page_title: "Subscription Confirmed — MarketDaily",
    success_title: "You're All Set 🎉",
    success_sub: "Payment complete — your plan is <strong>active immediately</strong>.<br>A confirmation email is on its way to your inbox.",
    step1: "<b>Check your email</b> — Open your inbox (including spam) and find the “Subscription Confirmed” message.",
    step2: "<b>Set a password</b> — Create a password the first time you log in to “My Account”.",
    step3: "<b>Pick your stocks</b> — Add the US / TW stocks you follow, and tomorrow's 7AM digest will be tailored to you.",
    success_btn: "Go to My Account →",
    success_note: "Didn't get the confirmation email? Wait 5 minutes and check your spam folder.<br>Still nothing? Email us at <a href=\"mailto:delvin.12345678@gmail.com\">delvin.12345678@gmail.com</a>"
  }
};

function applyLang(lang) {
  const t = i18n[lang] || i18n.zh;
  document.title = t.page_title;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const v = t[el.dataset.i18nHtml];
    if (v !== undefined) el.innerHTML = v;
  });
  const langBtn = document.querySelector('.lang-btn');
  if (langBtn) langBtn.textContent = lang === 'zh' ? 'EN' : '中文';
  document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : 'en';
  localStorage.setItem('md-lang-v2', lang);
}

function toggleLang() {
  const cur = localStorage.getItem('md-lang-v2') || 'zh';
  applyLang(cur === 'zh' ? 'en' : 'zh');
}

applyLang(localStorage.getItem('md-lang-v2') || 'zh');
</script>
</body>
</html>
