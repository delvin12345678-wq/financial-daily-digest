<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0a0a1a">
<link rel="icon" type="image/svg+xml" href="/logo-icon.svg">
<link rel="apple-touch-icon" href="/logo-icon.svg">
<title>Agent Team 戰情室 · MarketDaily</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :focus-visible { outline:2px solid #818cf8; outline-offset:2px; border-radius:4px; }
  body {
    font-family:'Inter','Noto Sans TC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0a0a1a; color:#e7e5f3; min-height:100vh;
    background-image:radial-gradient(900px 500px at 12% -8%,rgba(99,102,241,.22),transparent 70%),
                     radial-gradient(900px 500px at 100% 0%,rgba(244,114,182,.14),transparent 70%);
    -webkit-tap-highlight-color:transparent;
  }
  .wrap { max-width:1180px; margin:0 auto; padding:26px 18px 70px; }
  header { display:flex; justify-content:space-between; align-items:flex-end;
           flex-wrap:wrap; gap:12px; margin-bottom:24px; }
  .brand .kicker { font-size:11px; letter-spacing:3.5px; color:#a5b4fc;
                   text-transform:uppercase; }
  .brand h1 { font-size:26px; font-weight:800; color:#fde68a; margin-top:4px; }
  .meta { text-align:right; font-size:12px; color:#8b89a8; line-height:1.8; }
  .lang-btn {
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
    color:#c7d2fe; font-size:12px; font-weight:700; font-family:inherit;
    padding:6px 13px; border-radius:18px; cursor:pointer; transition:all .2s;
    margin-bottom:6px;
  }
  .lang-btn:hover { background:rgba(99,102,241,.18); border-color:rgba(99,102,241,.35); color:#fff; }
  .live { display:inline-flex; align-items:center; gap:6px; font-weight:600; }
  .live.ok { color:#34d399; } .live.warn { color:#fb923c; } .live.err { color:#ff6b6b; }
  .dot { width:8px; height:8px; border-radius:50%; background:currentColor;
         animation:pulse 2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(52,211,153,.5);}
                     70%{box-shadow:0 0 0 9px rgba(52,211,153,0);}
                     100%{box-shadow:0 0 0 0 rgba(52,211,153,0);} }

  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:11px; margin-bottom:24px; }
  .stat { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
          border-radius:14px; padding:15px 16px; }
  .stat .n { font-size:28px; font-weight:800; line-height:1; }
  .stat .l { font-size:12px; color:#8b89a8; margin-top:7px; }

  h2.sec { font-size:14px; font-weight:700; color:#c7d2fe; margin:28px 0 12px;
           letter-spacing:.5px; display:flex; align-items:center; gap:8px; }
  h2.sec::before { content:""; width:3px; height:15px; background:#6366f1; border-radius:2px; }

  .agents { display:grid; grid-template-columns:repeat(auto-fill,minmax(206px,1fr)); gap:12px; }
  .agent { background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08);
           border-radius:16px; padding:15px; position:relative; overflow:hidden; }
  .agent::before { content:""; position:absolute; top:0; left:0; right:0; height:3px;
                   background:var(--ac); }
  .agent .top { display:flex; align-items:center; gap:9px; margin-bottom:10px; }
  .agent .emoji { font-size:21px; }
  .agent .nm { font-weight:700; font-size:15px; }
  .agent .ds { font-size:11px; color:#8b89a8; }
  .badge { font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px;
           margin-left:auto; white-space:nowrap; }
  .b-working { background:rgba(251,146,60,.18); color:#fb923c; }
  .b-queued  { background:rgba(99,102,241,.18); color:#a5b4fc; }
  .b-idle    { background:rgba(255,255,255,.07); color:#8b89a8; }
  .agent .doing { font-size:12px; color:#cbd5e1; line-height:1.6;
                  background:rgba(0,0,0,.25); border-radius:9px; padding:9px 10px;
                  min-height:46px; }
  .agent .doing .lbl { font-weight:700; font-size:10px; letter-spacing:.5px; }
  .agent .tally { display:flex; gap:14px; margin-top:10px; font-size:11px; color:#8b89a8; }
  .agent .tally b { color:#e7e5f3; }

  .cols { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  @media(max-width:880px){ .cols,.stats{grid-template-columns:repeat(2,1fr);} }
  @media(max-width:520px){ .cols,.stats{grid-template-columns:1fr;} }
  .col h3 { font-size:12px; font-weight:700; margin-bottom:9px; color:#8b89a8;
            display:flex; justify-content:space-between; }
  .col h3 .c { background:rgba(255,255,255,.08); border-radius:10px;
               padding:1px 8px; color:#c7d2fe; }
  .card { background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08);
          border-left:3px solid var(--c,#6366f1); border-radius:11px;
          padding:11px 12px; margin-bottom:9px; }
  .card .t { font-weight:700; font-size:13px; line-height:1.4; }
  .card .tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:7px; }
  .tag { font-size:10px; padding:2px 7px; border-radius:6px;
         background:rgba(255,255,255,.08); color:#c7d2fe; }
  .tag.p高 { background:rgba(255,69,58,.2); color:#ff8a80; }
  .tag.p中 { background:rgba(255,159,10,.18); color:#ffcc80; }
  .tag.p低 { background:rgba(255,255,255,.08); color:#9ca3af; }
  .card .note { font-size:11px; color:#9aa0b4; line-height:1.6; margin-top:8px;
                border-top:1px solid rgba(255,255,255,.06); padding-top:7px;
                white-space:pre-wrap; }
  .card .lease { font-size:10px; margin-top:6px; font-weight:600; }
  .empty { font-size:12px; color:#5b596e; padding:14px 4px; text-align:center; }

  .feed { background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.07);
          border-radius:14px; padding:6px 4px; }
  .feed .row { display:flex; gap:11px; align-items:baseline; padding:8px 13px;
               font-size:12px; border-bottom:1px solid rgba(255,255,255,.045); }
  .feed .row:last-child { border-bottom:none; }
  .feed .hash { font-family:ui-monospace,Menlo,monospace; color:#818cf8;
                font-size:11px; flex-shrink:0; }
  .feed .msg { color:#cbd5e1; flex:1; }
  .feed .when { color:#6b6982; flex-shrink:0; font-size:11px; }
  footer { text-align:center; margin-top:32px; font-size:11px; color:#56546a; line-height:1.8; }
  .skel { padding:50px 0; text-align:center; color:#6b6982; font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="kicker" data-i18n="kicker">MarketDaily · Agent Team</div>
      <h1 data-i18n="h1">🛰️ 夜間戰情室</h1>
    </div>
    <div class="meta">
      <button class="lang-btn" onclick="toggleLang()">EN</button>
      <div class="live warn" id="status"><span class="dot"></span> <span data-i18n="connecting">連線中…</span></div>
      <div id="gen" data-i18n="loading_meta">讀取資料中</div>
    </div>
  </header>
  <div id="body"><div class="skel" data-i18n="loading_board">⏳ 載入戰情室資料…</div></div>
  <footer data-i18n-html="footer">
    夜間值班系統 · 資料來自 GitHub,每 60 秒自動更新<br>
    Worker 每輪重建 board.json,本頁無須重新部署即跟著最新進度走
  </footer>
</div>

<script>
const RAW = "https://raw.githubusercontent.com/marketdaily/financial-daily-digest/main/agent_team/board.json";

/* ── i18n ── */
const i18n = {
  zh: {
    page_title: "Agent Team 戰情室 · MarketDaily",
    kicker: "MarketDaily · Agent Team",
    h1: "🛰️ 夜間戰情室",
    connecting: "連線中…",
    loading_meta: "讀取資料中",
    loading_board: "⏳ 載入戰情室資料…",
    footer: "夜間值班系統 · 資料來自 GitHub,每 60 秒自動更新<br>Worker 每輪重建 board.json,本頁無須重新部署即跟著最新進度走",
    rel_now: "剛剛", rel_min: "分鐘前", rel_hr: "小時前", rel_day: "天前",
    st_live: "LIVE · 已連線", st_fail: "連線失敗 · 重試中",
    err_prefix: "⚠ 暫時讀不到資料(", err_suffix: ")<br>board.json 尚未產生或網路問題,60 秒後自動重試",
    stat_working: "進行中", stat_inbox: "待辦", stat_done: "完成", stat_failed: "失敗",
    sec_team: "值班團隊", sec_board: "任務看板", sec_activity: "活動軌跡",
    col_inbox: "📥 待辦", col_working: "⚙️ 進行中", col_done: "✅ 完成", col_failed: "❌ 失敗",
    empty: "— 空 —", no_activity: "尚無提交紀錄",
    badge_working: "執行中", badge_idle: "待命", badge_queued_suffix: "件排隊",
    doing_working: "執行中", doing_next: "下一個",
    doing_claimed: "已認領,執行中…", doing_standby: "目前待命,無排隊任務",
    tally_queued: "排隊", tally_done: "完成", tally_failed: "失敗",
    lease_left_pre: "🔒 租約剩 ", lease_left_post: " 分", lease_expired: "⚠ 租約已過期 · 下輪接手",
    completed_at: "完成於 ", attempts: "嘗試 ",
    generated_at: "資料產生於 "
  },
  en: {
    page_title: "Agent Team War Room · MarketDaily",
    kicker: "MarketDaily · Agent Team",
    h1: "🛰️ Night Shift War Room",
    connecting: "Connecting…",
    loading_meta: "Loading data",
    loading_board: "⏳ Loading war room data…",
    footer: "Night shift system · Data from GitHub, auto-refreshes every 60s<br>The Worker rebuilds board.json each cycle — this page tracks the latest progress with no redeploy needed",
    rel_now: "just now", rel_min: "min ago", rel_hr: "hr ago", rel_day: "d ago",
    st_live: "LIVE · Connected", st_fail: "Connection failed · Retrying",
    err_prefix: "⚠ Can't load data right now (", err_suffix: ")<br>board.json not generated yet or a network issue — auto-retry in 60s",
    stat_working: "Working", stat_inbox: "Inbox", stat_done: "Done", stat_failed: "Failed",
    sec_team: "On-Duty Team", sec_board: "Task Board", sec_activity: "Activity Feed",
    col_inbox: "📥 Inbox", col_working: "⚙️ Working", col_done: "✅ Done", col_failed: "❌ Failed",
    empty: "— Empty —", no_activity: "No commits yet",
    badge_working: "Working", badge_idle: "Idle", badge_queued_suffix: "queued",
    doing_working: "Working", doing_next: "Next up",
    doing_claimed: "Claimed, running…", doing_standby: "Idle — no queued tasks",
    tally_queued: "Queued", tally_done: "Done", tally_failed: "Failed",
    lease_left_pre: "🔒 Lease ", lease_left_post: " min left", lease_expired: "⚠ Lease expired · next cycle takes over",
    completed_at: "Completed at ", attempts: "Attempt ",
    generated_at: "Data generated at "
  }
};
let curLang = localStorage.getItem('md-lang-v2') || 'zh';
const T = () => i18n[curLang] || i18n.zh;
let lastBoard = null;

function applyLang(lang) {
  curLang = lang;
  const t = i18n[lang] || i18n.zh;
  document.title = t.page_title;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const v = t[el.dataset.i18nHtml];
    if (v !== undefined) el.innerHTML = v;
  });
  const langBtn = document.querySelector('.lang-btn');
  if (langBtn) langBtn.textContent = lang === 'zh' ? 'EN' : '中文';
  document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : 'en';
  localStorage.setItem('md-lang-v2', lang);
  if (lastBoard) render(lastBoard);
}
function toggleLang() {
  applyLang(curLang === 'zh' ? 'en' : 'zh');
}

const esc = s => (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function rel(iso){
  if(!iso) return "";
  const t=T();
  const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<60) return t.rel_now;
  if(s<3600) return Math.floor(s/60)+" "+t.rel_min;
  if(s<86400) return Math.floor(s/3600)+" "+t.rel_hr;
  return Math.floor(s/86400)+" "+t.rel_day;
}
function leaseInfo(iso){
  if(!iso) return null;
  const t=T();
  const left=(new Date(iso).getTime()-Date.now())/1000;
  if(left>0) return {txt:t.lease_left_pre+Math.ceil(left/60)+t.lease_left_post,col:"#34d399"};
  return {txt:t.lease_expired,col:"#fb923c"};
}
function setStatus(cls,txt){
  const e=document.getElementById("status");
  e.className="live "+cls;
  e.innerHTML='<span class="dot"></span> '+txt;
}

function taskCard(t,k,c){
  const L=T();
  let note="",lease="";
  if(k==="working"){
    note=(t.progress||[]).join("\n");
    const li=leaseInfo(t.lease);
    if(li) lease=`<div class="lease" style="color:${li.col}">${li.txt}</div>`;
  }else if(k==="done"||k==="failed"){
    note=t.summary||(t.progress||[]).slice(-1)[0]||"";
    if(t.completed) note=(note?note+"\n":"")+L.completed_at+t.completed;
  }else{ note=t.desc||""; }
  return `<div class="card" style="--c:${c}">
    <div class="t">${esc(t.title)}</div>
    <div class="tags"><span class="tag">${esc(t.type)}</span>
      <span class="tag p${t.priority}">${esc(t.priority)}</span>
      ${t.attempts&&t.attempts!=="0"?`<span class="tag">${L.attempts}${t.attempts}</span>`:""}
      <span class="tag" style="background:none;color:#5b596e">${esc(t.id)}</span></div>
    ${note?`<div class="note">${esc(note)}</div>`:""}${lease}
  </div>`;
}

function render(b){
  lastBoard=b;
  const L=T();
  const S=b.stats;
  const stats=[[L.stat_working,S.working,"#fb923c"],[L.stat_inbox,S.inbox,"#a5b4fc"],
    [L.stat_done,S.done,"#34d399"],[L.stat_failed,S.failed,"#ff6b6b"]]
    .map(([l,n,c])=>`<div class="stat"><div class="n" style="color:${c}">${n}</div>
      <div class="l">${l}</div></div>`).join("");

  const agents=b.agents.map(a=>{
    let doing;
    if(a.current){
      const pg=(a.current.progress||[]).slice(-1)[0]||L.doing_claimed;
      doing=`<div class="doing"><span class="lbl" style="color:#fb923c">${L.doing_working}</span><br>
        ${esc(a.current.title)}
        <div style="color:#8b89a8;margin-top:4px">${esc(pg)}</div></div>`;
    }else if(a.next){
      doing=`<div class="doing"><span class="lbl" style="color:#a5b4fc">${L.doing_next}</span><br>
        ${esc(a.next.title)}</div>`;
    }else{
      doing=`<div class="doing" style="color:#5b596e">${L.doing_standby}</div>`;
    }
    const bc=a.status==="working"?"b-working":a.status==="queued"?"b-queued":"b-idle";
    const bt=a.status==="working"?L.badge_working:a.status==="queued"?a.queued+" "+L.badge_queued_suffix:L.badge_idle;
    return `<div class="agent" style="--ac:${a.accent}">
      <div class="top"><span class="emoji">${a.emoji}</span>
        <div><div class="nm">${a.name}</div><div class="ds">${esc(a.desc)}</div></div>
        <span class="badge ${bc}">${bt}</span></div>
      ${doing}
      <div class="tally"><span>${L.tally_queued} <b>${a.queued}</b></span>
        <span>${L.tally_done} <b>${a.done}</b></span>
        <span>${L.tally_failed} <b style="${a.failed?'color:#ff6b6b':''}">${a.failed}</b></span></div>
    </div>`;
  }).join("");

  const cols=[["inbox",L.col_inbox,"#a5b4fc"],["working",L.col_working,"#fb923c"],
    ["done",L.col_done,"#34d399"],["failed",L.col_failed,"#ff6b6b"]]
    .map(([k,label,c])=>{
      const list=b.tasks[k]||[];
      const inner=list.length?list.map(t=>taskCard(t,k,c)).join(""):
        `<div class="empty">${L.empty}</div>`;
      return `<div class="col"><h3>${label}<span class="c">${list.length}</span></h3>${inner}</div>`;
    }).join("");

  const act=b.activity||[];
  const feed=act.length?act.map(r=>
    `<div class="row"><span class="hash">${r.hash}</span>
      <span class="msg">${esc(r.msg)}</span>
      <span class="when">${rel(r.iso)}</span></div>`).join(""):
    `<div class="empty">${L.no_activity}</div>`;

  document.getElementById("body").innerHTML=
    `<div class="stats">${stats}</div>
     <h2 class="sec">${L.sec_team}</h2><div class="agents">${agents}</div>
     <h2 class="sec">${L.sec_board}</h2><div class="cols">${cols}</div>
     <h2 class="sec">${L.sec_activity}</h2><div class="feed">${feed}</div>`;
  document.getElementById("gen").textContent=L.generated_at+b.generated_display;
}

async function load(){
  try{
    const r=await fetch(RAW+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    render(await r.json());
    setStatus("ok",T().st_live);
  }catch(e){
    setStatus("err",T().st_fail);
    if(!document.querySelector(".stats"))
      document.getElementById("body").innerHTML=
        `<div class="skel">${T().err_prefix}${esc(e.message)}${T().err_suffix}</div>`;
  }
}
applyLang(curLang);
load();
setInterval(load,60000);
</script>
</body>
</html>
